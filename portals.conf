# ~/.config/xdg-desktop-portal/portals.conf
# Backends XDG para Hyprland + Illogical Impulse
# xdg-desktop-portal-hyprland cobre screenshare e screenshot
# xdg-desktop-portal-kde cobre file picker, settings e o restante

[preferred]
default=hyprland;kde
org.freedesktop.impl.portal.FileChooser=kde
org.freedesktop.impl.portal.AppChooser=kde
org.freedesktop.impl.portal.Screenshot=hyprland
org.freedesktop.impl.portal.ScreenCast=hyprland
org.freedesktop.impl.portal.Settings=kde
org.freedesktop.impl.portal.Inhibit=hyprland
org.freedesktop.impl.portal.Notification=kde
