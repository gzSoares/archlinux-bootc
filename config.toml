# config.toml — bootc-image-builder
# Generates an Anaconda ISO from ghcr.io/gzsoares/archlinux-bootc
#
# Usage:
#   mkdir -p output
#   sudo podman run --rm -it --privileged --pull=newer \
#     --security-opt label=type:unconfined_t \
#     -v ./output:/output \
#     -v ./config.toml:/config.toml:ro \
#     -v /var/lib/containers/storage:/var/lib/containers/storage \
#     quay.io/centos-bootc/bootc-image-builder:latest \
#     --type anaconda-iso \
#     --rootfs btrfs \
#     ghcr.io/gzsoares/archlinux-bootc:latest

# -----------------------------------------------------------------------------
# Default user — change password hash with: openssl passwd -6
# -----------------------------------------------------------------------------
[[customizations.user]]
name = "user"
groups = ["wheel", "video", "audio", "network", "storage", "optical", "input"]
password = "$6$rounds=65536$changeme$REPLACETHISWITHAREALHASH"

[[customizations.user]]
name = "root"
password = "!"

# -----------------------------------------------------------------------------
# Anaconda modules
# -----------------------------------------------------------------------------
[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Users",
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Timezone",
  "org.fedoraproject.Anaconda.Modules.Localization",
]

# -----------------------------------------------------------------------------
# Kickstart — partitioning, locale, timezone
# -----------------------------------------------------------------------------
[customizations.installer.kickstart]
contents = """
lang en_US.UTF-8
keyboard us
timezone UTC --utc

clearpart --all --initlabel
zerombr

part /boot/efi --fstype=efi --size=600 --fsoptions="umask=0077,shortname=winnt"
part /boot     --fstype=ext4 --size=2048
part btrfs.01  --fstype=btrfs --grow

btrfs none  --label=arch btrfs.01
btrfs /     --subvol --name=root LABEL=arch
btrfs /var  --subvol --name=var  LABEL=arch
btrfs /home --subvol --name=home LABEL=arch
"""
