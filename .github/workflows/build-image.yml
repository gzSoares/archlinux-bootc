name: Build Image (ISO)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "OCI image tag (e.g. latest, sha-abc1234)"
        required: false
        default: "latest"
      rootfs:
        description: "Root filesystem"
        required: false
        default: "btrfs"
        type: choice
        options: [btrfs, xfs, ext4]
      image_type:
        description: "Output image type"
        required: false
        default: "anaconda-iso"
        type: choice
        options: [anaconda-iso, raw, qcow2, vmdk]
      upload_release:
        description: "Publish as GitHub Release"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      image_tag:
        required: false
        type: string
        default: "latest"
      rootfs:
        required: false
        type: string
        default: "btrfs"
      image_type:
        required: false
        type: string
        default: "anaconda-iso"
      upload_release:
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/powershell \
            /usr/share/swift \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve variables
        id: vars
        run: |
          TAG="${{ inputs.image_tag || 'latest' }}"
          TYPE="${{ inputs.image_type || 'anaconda-iso' }}"
          ROOTFS="${{ inputs.rootfs || 'btrfs' }}"
          # GHCR requires lowercase
          IMAGE="$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]'):${TAG}"
          echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          echo "type=${TYPE}"     >> "$GITHUB_OUTPUT"
          echo "rootfs=${ROOTFS}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}"   >> "$GITHUB_OUTPUT"
          echo "Building: ${IMAGE} → type=${TYPE}, rootfs=${ROOTFS}"

      - name: Pull OCI image
        run: sudo podman pull ${{ steps.vars.outputs.image }}

      - name: Generate image via bootc-image-builder
        run: |
          mkdir -p output
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v ./output:/output \
            -v ./config.toml:/config.toml:ro \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type ${{ steps.vars.outputs.type }} \
            --rootfs ${{ steps.vars.outputs.rootfs }} \
            --local \
            ${{ steps.vars.outputs.image }}

      - name: List output
        run: ls -lh output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-bootc-${{ steps.vars.outputs.type }}-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ inputs.upload_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: image-${{ github.run_number }}
          name: "archlinux-bootc image #${{ github.run_number }}"
          body: |
            **Type:** `${{ steps.vars.outputs.type }}`
            **Rootfs:** `${{ steps.vars.outputs.rootfs }}`
            **OCI image:** `${{ steps.vars.outputs.image }}`
            **Commit:** ${{ github.sha }}
          files: output/*
          fail_on_unmatched_files: false
